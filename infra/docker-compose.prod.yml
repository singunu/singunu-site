# 운영용 compose — api 컨테이너만 (MongoDB 는 Atlas 사용이라 제외)
# GitHub Actions SSH 배포(deploy.sh)를 쓰면 이 파일은 필수는 아니지만,
# 서버에서 수동으로 올리고 싶을 때 사용:
#   cd /opt/singunu && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# 전제: 같은 폴더의 .env 에 운영 환경변수 (infra/.env.prod.example 참고, 커밋 금지)
services:
  api:
    # 👇 OWNER 를 저장소 소유자명(소문자)으로 교체
    image: ghcr.io/OWNER/singunu-api:latest
    container_name: singunu-api
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"   # Nginx 만 접근 — 외부 직접 노출 안 함
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
