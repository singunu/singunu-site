# api.singunu.com 리버스 프록시 → 127.0.0.1:8080 (Spring Boot 컨테이너)
# 배치 위치: /etc/nginx/sites-available/api.singunu.com  → sites-enabled 로 심볼릭 링크
#   sudo ln -s /etc/nginx/sites-available/api.singunu.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 순서: (1) 아래 80 블록만 먼저 올린 뒤 certbot 로 인증서 발급
#       (2) certbot 이 443 블록을 자동 추가하거나, 아래 443 블록을 수동으로 활성화
#
# SSE(Server-Sent Events) 스트리밍이 핵심이므로 proxy_buffering off 등은 반드시 유지.

# ── HTTP(80): ACME challenge + HTTPS 강제 리다이렉트 ──
server {
    listen 80;
    listen [::]:80;
    server_name api.singunu.com;

    # Let's Encrypt certbot 갱신용 challenge 경로 (webroot 방식)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 요청은 HTTPS 로
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS(443): 실제 API 프록시 ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.singunu.com;

    # certbot 발급 후 아래 경로가 생성된다 (도메인명 그대로)
    ssl_certificate     /etc/letsencrypt/live/api.singunu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.singunu.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 업로드/요청 본문 상한 (대화 페이로드는 작지만 여유)
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # ── SSE 스트리밍 필수 설정 ──
        proxy_buffering off;              # 응답을 모아두지 말고 즉시 흘려보낸다 (토큰 스트리밍)
        proxy_cache off;
        proxy_http_version 1.1;           # keep-alive / 스트리밍에 필요
        proxy_set_header Connection "";   # 업스트림 keep-alive 유지(hop-by-hop 헤더 정리)
        proxy_read_timeout 300s;          # 긴 응답 스트림 중 끊기지 않도록
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;

        # 표준 프록시 헤더
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
