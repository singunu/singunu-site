<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L안 — Clay Buddy Pro · AI 신건우</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  /* K안 업그레이드 — 캔버스 젤리 물리 마스코트.
     · 잡은 부위만 국소적으로 늘어남 (36점 스프링 블롭, 이웃 감쇠)
     · 잡은 부위가 발그레해졌다가 서서히 사라짐 (여러 부위 공존)
     · 길게 늘였다 놓으면 1000가지 랜덤 멘트 말풍선
     · 세게 당기면 눈 찡그림, 눈이 몸을 한 박자 늦게 따라옴(팔로우스루) */
  :root {
    --bg: #eef0fa; --ink: #3a3560; --dim: #8f8bb0;
    --lav: #c9c4f4; --peach: #ffd9c4; --mint: #c9efdd;
    --clay-hi: rgba(255,255,255,.95); --clay-lo: rgba(90,80,160,.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard Variable", Pretendard, sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100dvh; display: flex; flex-direction: column;
    overflow-x: hidden;   /* 캔버스가 레이아웃보다 커서 모바일 가로 스크롤 방지 */
  }
  .clay {
    background: #fff;
    border-radius: 24px;
    box-shadow:
      0 14px 30px -8px var(--clay-lo),
      inset 0 -8px 14px -6px var(--clay-lo),
      inset 0 8px 12px -6px var(--clay-hi);
  }

  header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; background: rgba(238,240,250,.85); backdrop-filter: blur(10px); }
  header .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #fff 0%, var(--lav) 55%, #a89ef0 100%);
    box-shadow: 0 8px 18px -4px var(--clay-lo), inset 0 -5px 8px -3px var(--clay-lo), inset 0 5px 8px -3px var(--clay-hi);
    display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; color: #5a4fd0;
  }
  header .title { font-weight: 800; font-size: 15px; }
  header .status { margin-left: auto; font-size: 11px; color: var(--dim); font-weight: 600; }

  .hero { max-width: 620px; margin: 0 auto; width: 100%; padding: 26px 20px 14px; text-align: center; }

  .buddyWrap {
    position: relative; width: 320px; margin: 0 auto; user-select: none;
    -webkit-tap-highlight-color: transparent; touch-action: none;
  }
  /* 캔버스는 레이아웃(320×252)보다 크게 잡고 네거티브 마진으로 겹침 —
     늘어난 몸이 사각형 밖에서 잘리지 않도록 사방 여유 공간 확보 */
  #buddyCanvas { display: block; width: 600px; height: 460px; margin: -104px -140px; }

  /* 랜덤 멘트 말풍선 */
  .quip {
    position: absolute; left: 50%; top: 10px;
    transform: translate(-50%, -100%) scale(.5);
    background: #fff; border-radius: 16px; padding: 10px 15px;
    font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap;
    box-shadow: 0 10px 22px -6px var(--clay-lo), inset 0 -5px 9px -5px var(--clay-lo), inset 0 5px 8px -5px var(--clay-hi);
    opacity: 0; pointer-events: none; z-index: 5;
    transition: transform .38s cubic-bezier(.2, 1.9, .3, .8), opacity .18s;
  }
  .quip.show { opacity: 1; transform: translate(-50%, -100%) scale(1); }
  .quip::after {
    content: ""; position: absolute; left: 50%; bottom: -5px;
    width: 12px; height: 12px; background: #fff;
    transform: translateX(-50%) rotate(45deg); border-radius: 3px;
  }

  .hero h1 { font-size: clamp(25px, 6vw, 36px); font-weight: 900; letter-spacing: -.025em; line-height: 1.3; margin-top: 8px; }
  .hero h1 span { color: #7a6ef0; }
  .hero p { margin: 13px auto 0; font-size: 14.5px; line-height: 1.8; color: var(--dim); font-weight: 500; max-width: 42ch; }

  .chat { flex: 1; max-width: 620px; margin: 0 auto; width: 100%; padding: 10px 20px 155px; }
  .chips { display: flex; flex-wrap: wrap; gap: 11px; justify-content: center; margin: 24px 0; }
  .chip {
    padding: 12px 17px; border: none; border-radius: 18px; font-size: 13px; font-weight: 700;
    color: var(--ink); cursor: pointer; background: #fff;
    box-shadow: 0 10px 20px -6px var(--clay-lo), inset 0 -6px 10px -5px var(--clay-lo), inset 0 6px 9px -5px var(--clay-hi);
    transition: transform .12s, box-shadow .12s;
  }
  .chip:hover { transform: translateY(-3px); }
  .chip:active {
    transform: translateY(1px);
    box-shadow: 0 4px 10px -4px var(--clay-lo), inset 0 4px 10px -3px var(--clay-lo);
  }

  .msg { margin: 20px 0; display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble { max-width: 82%; padding: 15px 19px; font-size: 15px; line-height: 1.7; font-weight: 500; border-radius: 22px; }
  .msg.ai .bubble {
    background: #fff; border-bottom-left-radius: 8px;
    box-shadow: 0 12px 26px -8px var(--clay-lo), inset 0 -7px 12px -6px var(--clay-lo), inset 0 7px 11px -6px var(--clay-hi);
  }
  .msg.user .bubble {
    background: linear-gradient(145deg, #b7aef6, #9d90ee); color: #fff; border-bottom-right-radius: 8px;
    box-shadow: 0 12px 26px -8px rgba(122,110,240,.5), inset 0 -7px 12px -6px rgba(70,55,180,.4), inset 0 7px 11px -6px rgba(255,255,255,.55);
  }
  .msg.ai .label { font-size: 11.5px; color: #7a6ef0; font-weight: 800; margin-bottom: 7px; }

  .typing { display: inline-flex; gap: 5px; padding: 3px 0; }
  .typing i { width: 8px; height: 8px; border-radius: 50%; background: var(--lav); animation: tsquish 1.2s infinite; }
  .typing i:nth-child(2) { animation-delay: .18s; background: var(--peach); }
  .typing i:nth-child(3) { animation-delay: .36s; background: var(--mint); }
  @keyframes tsquish { 0%,60%,100% { transform: scale(1); } 30% { transform: scale(1.45,.75); } }

  .inputbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 20px calc(18px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 46%);
  }
  .inputbar .box {
    max-width: 584px; margin: 0 auto; display: flex; gap: 8px; align-items: center;
    padding: 7px 7px 7px 20px; border-radius: 26px;
  }
  .inputbar input { flex: 1; border: none; outline: none; background: none; font: inherit; font-size: 15px; font-weight: 500; padding: 12px 0; color: var(--ink); }
  .inputbar input::placeholder { color: #b7b3d4; }
  .send {
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; font-size: 17px; color: #fff;
    background: linear-gradient(145deg, #8f83ee, #7a6ef0);
    box-shadow: 0 10px 20px -5px rgba(122,110,240,.55), inset 0 -5px 9px -4px rgba(70,55,180,.45), inset 0 5px 8px -4px rgba(255,255,255,.5);
    transition: transform .12s;
  }
  .send:active { transform: scale(.92); }
</style>
</head>
<body>
  <header>
    <div class="avatar">신</div>
    <div class="title">AI 신건우</div>
    <div class="status">soft &amp; honest</div>
  </header>

  <div class="hero">
    <div class="buddyWrap" id="buddyWrap">
      <div class="quip" id="quip"></div>
      <canvas id="buddyCanvas" aria-label="말랑한 점토 구체 마스코트 — 잡아늘여 보세요"></canvas>
    </div>

    <h1>안녕하세요,<br><span>AI 건우</span>예요</h1>
    <p>AI 데이터 PM 신건우의 디지털 트윈이에요. 검수된 정보로만 답하고,
    모르는 건 지어내지 않아요 — 본체가 직접 답하러 옵니다.</p>
  </div>

  <main class="chat">
    <div class="chips">
      <button class="chip">어떤 일 하셨어요?</button>
      <button class="chip">인생 영화 3편만요</button>
      <button class="chip">MBTI가 뭐예요?</button>
      <button class="chip">요즘 목표는요?</button>
    </div>

    <div class="msg user"><div class="bubble">어떤 일 하셨어요?</div></div>
    <div class="msg ai">
      <div>
        <div class="label">AI 건우</div>
        <div class="bubble">AI 학습 데이터의 의미적 정확성을 검증하는 데이터 PM으로 일했어요.
        100명 규모 라벨링 조직을 시트와 정책으로 시스템화해서 굴렸습니다.</div>
      </div>
    </div>
    <div class="msg ai">
      <div>
        <div class="label">AI 건우</div>
        <div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>
      </div>
    </div>
  </main>

  <div class="inputbar">
    <div class="box clay">
      <input placeholder="신건우에 대해 물어보세요..." />
      <button class="send">↑</button>
    </div>
  </div>

<script>
(function () {
  'use strict';
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var canvas = document.getElementById('buddyCanvas');
  var ctx = canvas.getContext('2d');
  var W = 600, H = 460;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  /* ── 젤리 블롭 물리: 36개 표면 점 + 중심, 각각 스프링 ── */
  var N = 36, R = 62;
  var REST = { x: W / 2, y: 220 };
  var center = { x: REST.x, y: REST.y, vx: 0, vy: 0 };
  var pts = [];
  for (var i = 0; i < N; i++) {
    var a = i / N * Math.PI * 2;
    pts.push({ a: a, x: REST.x + Math.cos(a) * R, y: REST.y + Math.sin(a) * R, vx: 0, vy: 0 });
  }

  var dragging = false, gi = -1, grab = { x: 0, y: 0 };
  var curStretch = 0, maxStretch = 0;
  var blushes = [];      // 잡힌 부위 홍조 목록 — 새 드래그가 시작돼도 이전 홍조는 남아 있음
  var activeBlush = 0;   // 진하게 남아 있는 홍조 개수 → 표정(슬픔/화남) 트리거
  var t = 0;

  function toLocal(e) {
    var r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function step() {
    t += 1 / 60;
    var bobY = (reduced || dragging) ? 0 : Math.sin(t * 1.7) * 4;

    // 드래그 변위 계산 (tanh 저항 — 당길수록 뻑뻑해짐)
    // 안쪽으로 누르는 성분은 반경의 55%까지만 파이고, 초과분은 몸 전체가 밀려남
    // → 위를 잡고 아래로 당겨도 표면이 몸을 관통(뒤집힘)하지 않는다
    var ux = 0, uy = 0, eff = 0, pushX = 0, pushY = 0;
    if (dragging && gi >= 0) {
      var gnx = Math.cos(pts[gi].a), gny = Math.sin(pts[gi].a);
      var rgx = center.x + gnx * R;
      var rgy = center.y + gny * R;
      var dx = grab.x - rgx, dy = grab.y - rgy;
      var rad = dx * gnx + dy * gny;                  // 반경 방향 성분 (+ 바깥 / - 안쪽)
      var tgx = dx - rad * gnx, tgy = dy - rad * gny; // 접선 성분
      var maxDent = R * .55;
      if (rad < -maxDent) {
        var press = -(rad + maxDent);
        var pm = Math.min(press, 90);
        pushX = -gnx * pm; pushY = -gny * pm;
        rad = -maxDent;
      }
      var ex = gnx * rad + tgx, ey = gny * rad + tgy;
      var d = Math.sqrt(ex * ex + ey * ey);
      var MAXD = 150;
      eff = d > 0 ? MAXD * Math.tanh(d / MAXD) : 0;
      if (d > 0) { ux = ex / d; uy = ey / d; }
      curStretch = eff;
      if (eff > maxStretch) maxStretch = eff;
    } else {
      curStretch *= .9;
    }

    // 중심 스프링 (드래그 중엔 살짝 끌려오고, 눌림 초과분만큼 밀려남)
    var tx = REST.x + ux * eff * .2 + pushX * .9;
    var ty = REST.y + bobY + uy * eff * .2 + pushY * .9;
    // 화난 상태(홍조 6개 이상)면 부들부들 떨림
    if (activeBlush >= 6 && !reduced) {
      tx += (Math.random() - .5) * 2.4;
      ty += (Math.random() - .5) * 2.4;
    }
    center.vx = (center.vx + (tx - center.x) * .06) * .88;
    center.vy = (center.vy + (ty - center.y) * .06) * .88;
    center.x += center.vx; center.y += center.vy;

    // 표면 점: rest 스프링 + 이웃 중점 스프링(매끈함 유지)
    for (var i = 0; i < N; i++) {
      var p = pts[i];
      var rx = center.x + Math.cos(p.a) * R;
      var ry = center.y + Math.sin(p.a) * R;
      var prev = pts[(i + N - 1) % N], next = pts[(i + 1) % N];
      var nx = (prev.x + next.x) / 2, ny = (prev.y + next.y) / 2;
      p.vx = (p.vx + (rx - p.x) * .12 + (nx - p.x) * .09) * .86;
      p.vy = (p.vy + (ry - p.y) * .12 + (ny - p.y) * .09) * .86;
      p.x += p.vx; p.y += p.vy;
    }

    // 잡은 부위 국소 변형: 잡은 점 주변만 코사인 감쇠로 끌려감
    if (dragging && gi >= 0) {
      var HALF = 7;
      for (var j = -HALF; j <= HALF; j++) {
        var idx = (gi + j + N) % N;
        var w = Math.pow(Math.cos(j / (HALF + 1) * Math.PI / 2), 1.6);
        var q = pts[idx];
        var qx = center.x + Math.cos(q.a) * R + ux * eff * w;
        var qy = center.y + Math.sin(q.a) * R + uy * eff * w;
        q.x += (qx - q.x) * .6;
        q.y += (qy - q.y) * .6;
        q.vx *= .5; q.vy *= .5;
      }
    }

    // 홍조: 놓은 뒤 잡혔던 자리에 나타나 오래 머물다 서서히 사라짐.
    // 배열로 관리해 새 드래그 중에도 이전 홍조는 제 타이머대로 남아 있음
    var nowMs = performance.now();
    activeBlush = 0;
    for (var b = blushes.length - 1; b >= 0; b--) {
      var bl = blushes[b];
      var bp = pts[bl.idx];
      bl.x = bp.x - Math.cos(bp.a) * 10;
      bl.y = bp.y - Math.sin(bp.a) * 10;
      var bTarget = nowMs < bl.until ? bl.peak : 0;
      bl.a += (bTarget - bl.a) * (bTarget > bl.a ? .12 : .02);
      if (bTarget === 0 && bl.a < .005) blushes.splice(b, 1);
      else if (bl.a > .08) activeBlush++;
    }
  }

  /* ── 그리기 ── */
  function blobPath() {
    ctx.beginPath();
    var last = pts[N - 1], first = pts[0];
    ctx.moveTo((last.x + first.x) / 2, (last.y + first.y) / 2);
    for (var i = 0; i < N; i++) {
      var p = pts[i], nx = pts[(i + 1) % N];
      ctx.quadraticCurveTo(p.x, p.y, (p.x + nx.x) / 2, (p.y + nx.y) / 2);
    }
    ctx.closePath();
  }

  var eyeC = { x: REST.x, y: REST.y - 10 };
  var gaze = { x: 0, y: 0 };          // 현재 눈동자 오프셋
  var gazeTarget = { x: 0, y: 0 };
  var lastMove = 0, eyesCentered = true;
  var blinkStart = -1;
  // 표정 파라미터 (부드럽게 보간): tilt + 화남 / - 슬픔, lift 눈썹 높이, squeeze 눈 감김, gy 시선 처짐
  var expr = { tilt: 0, lift: 0, squeeze: 0, gy: 0 };
  var browFlashUntil = 0;             // 눈썹 들썩(딴청·멘트 때 살짝 올라감)

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // 무게중심
    var cx = 0, cy = 0;
    for (var i = 0; i < N; i++) { cx += pts[i].x; cy += pts[i].y; }
    cx /= N; cy /= N;

    // 바닥 그림자 (떠오르면 작아짐)
    var lift = REST.y - cy;
    var s = Math.max(.55, Math.min(1.15, 1 - lift / 120));
    ctx.save();
    ctx.translate(REST.x, 312); ctx.scale(s, s * .22);
    var sg = ctx.createRadialGradient(0, 0, 2, 0, 0, 52);
    sg.addColorStop(0, 'rgba(90,80,160,.30)');
    sg.addColorStop(1, 'rgba(90,80,160,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(0, 0, 52, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // 몸통 — 점토 그라디언트
    blobPath();
    var bg = ctx.createRadialGradient(cx - R * .35, cy - R * .45, R * .1, cx, cy, R * 1.3);
    bg.addColorStop(0, '#f4f2fe');
    bg.addColorStop(.4, '#d7d2f9');
    bg.addColorStop(.78, '#c9c4f4');
    bg.addColorStop(1, '#a89ef0');
    ctx.fillStyle = bg;
    ctx.fill();

    // 몸통 내부 디테일 (클립)
    ctx.save();
    blobPath(); ctx.clip();
    // 위 하이라이트
    var hg = ctx.createRadialGradient(cx - R * .3, cy - R * .6, 4, cx - R * .3, cy - R * .6, R * .95);
    hg.addColorStop(0, 'rgba(255,255,255,.85)');
    hg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hg; ctx.fillRect(cx - R * 2, cy - R * 2, R * 4, R * 4);
    // 아래 안쪽 음영
    var dg = ctx.createRadialGradient(cx, cy + R * .95, R * .2, cx, cy + R * .95, R * 1.1);
    dg.addColorStop(0, 'rgba(90,80,160,.32)');
    dg.addColorStop(1, 'rgba(90,80,160,0)');
    ctx.fillStyle = dg; ctx.fillRect(cx - R * 2, cy - R * 2, R * 4, R * 4);
    // 잡혔던 부위 홍조들 (여러 개 공존)
    for (var bi2 = 0; bi2 < blushes.length; bi2++) {
      var bl2 = blushes[bi2];
      if (bl2.a < .01) continue;
      var rg = ctx.createRadialGradient(bl2.x, bl2.y, 2, bl2.x, bl2.y, 30);
      rg.addColorStop(0, 'rgba(255,100,120,' + bl2.a.toFixed(3) + ')');
      rg.addColorStop(1, 'rgba(255,100,120,0)');
      ctx.fillStyle = rg; ctx.fillRect(bl2.x - 34, bl2.y - 34, 68, 68);
    }
    ctx.restore();

    // 눈 — 몸을 한 박자 늦게 따라옴(팔로우스루)
    eyeC.x += (cx - eyeC.x) * .16;
    eyeC.y += (cy - 10 - eyeC.y) * .16;
    gaze.x += (gazeTarget.x - gaze.x) * .2;
    gaze.y += (gazeTarget.y - gaze.y) * .2;

    // 표정 결정: 당기는 중엔 아픈 찡그림, 홍조 3개↑ 슬픔, 6개↑ 화남 — 홍조가 식으면 원상복귀
    var tTilt = 0, tLift = 0, tSqueeze = 0, tGy = 0;
    if (dragging && curStretch > 30) { tTilt = -.38; tLift = 1.2; }
    if (activeBlush >= 6) { tTilt = .58; tLift = -2.5; tSqueeze = .38; }
    else if (activeBlush >= 3) { tTilt = -.6; tLift = 1.5; tSqueeze = .22; tGy = 1.8; }
    if (performance.now() < browFlashUntil) tLift -= 3;
    expr.tilt += (tTilt - expr.tilt) * .08;
    expr.lift += (tLift - expr.lift) * .08;
    expr.squeeze += (tSqueeze - expr.squeeze) * .08;

    var blinkF = 1;

      else { blinkF = Math.max(.06, 1 - Math.sin(Math.PI * bt)); }

      ctx.quadraticCurveTo(0, -2, 8, 1);
      ctx.stroke();

    dragging = true; maxStretch = 0;
    grab = m;

      var d = Math.pow(pts[i].x - m.x, 2) + Math.pow(pts[i].y - m.y, 2);

      var peak = Math.min(.2 + maxStretch / 160, .55);

      for (var bi = 0; bi < blushes.length; bi++) {
        if (Math.abs(blushes[bi].idx - gi) <= 2) { hit = blushes[bi]; break; }

    '재밌으면 됐어요', '질문으로 갚아주세요', '다음엔 살살요', '본체는 몰라야 해요', '노하우가 생겼어요', '탄성은 무한하니까요',
    '내일은 쉬고 싶어요', '월급은 없지만요', '보람은 있어요', '정 들었잖아요', '싫지는 않아요', '한 번 더는 안 돼요'];

  function cross(A, B, sep) {
    var out = [];
    for (var i = 0; i < A.length; i++)
      for (var j = 0; j < B.length; j++)
        out.push(A[i] + sep + B[j]);
    return out;
  }
  var QUIPS = (function () {
    // 160 + 12×31 + 6×14 + 8×12 + 10×10 + 10×20 = 1012 → 중복 제거 후 1000개로
    var all = BASE
      .concat(cross(PAIN, FOLLOW, ' '))
      .concat(cross(OPENER, TOPIC, ' '))
      .concat(cross(SUBJ, PRED, ' '))
      .concat(cross(MEAS, VAL, ''))
      .concat(cross(FEEL, CLOSER, ' '));
    var seen = {}, uniq = [];
    for (var i = 0; i < all.length; i++) {
      if (!seen[all[i]]) { seen[all[i]] = 1; uniq.push(all[i]); }
    }
    return uniq.slice(0, 1000);
  })();
  console.log('랜덤 멘트 풀: ' + QUIPS.length + '개');
  var bag = [];
  function nextQuip() {
    if (bag.length === 0) {
      bag = QUIPS.slice();
      for (var i = bag.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = bag[i]; bag[i] = bag[j]; bag[j] = tmp;
      }
    }
    return bag.pop();
  }

  var quipEl = document.getElementById('quip');
  var quipTimer = null;
  function showQuip() {
    browFlashUntil = performance.now() + 420;   // 말할 때 눈썹 들썩
    quipEl.textContent = nextQuip();
    quipEl.classList.remove('show');
    void quipEl.offsetWidth;
    quipEl.classList.add('show');
    clearTimeout(quipTimer);
    quipTimer = setTimeout(function () { quipEl.classList.remove('show'); }, 2600);
  }
})();
</script>
