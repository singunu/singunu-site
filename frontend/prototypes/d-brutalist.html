<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D안 — Brutalist · AI 신건우</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  /* 네오브루탈리즘: 두꺼운 잉크 테두리 + 하드섀도우 + 원색 포인트(라임/핑크) */
  :root {
    --bg: #fff4e0; --panel: #ffffff; --ink: #111111; --dim: #565656;
    --lime: #d6ff3f; --pink: #ff5fa2; --blue: #4d6dff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard Variable", Pretendard, sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100dvh; display: flex; flex-direction: column;
  }
  .hard { box-shadow: 5px 5px 0 var(--ink); }

  header {
    padding: 14px 20px; display: flex; align-items: center; gap: 10px;
    border-bottom: 3px solid var(--ink); background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  header .badge {
    width: 30px; height: 30px; background: var(--lime); border: 3px solid var(--ink);
    display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px;
  }
  header .title { font-weight: 900; font-size: 15px; letter-spacing: -.01em; }
  header .status {
    margin-left: auto; font-size: 11px; font-weight: 700; padding: 5px 10px;
    background: var(--ink); color: var(--bg); border-radius: 999px;
  }

  .hero { max-width: 640px; margin: 0 auto; width: 100%; padding: 44px 20px 24px; }
  .hero .tag {
    display: inline-block; font-size: 12px; font-weight: 800; padding: 5px 12px;
    background: var(--pink); color: #fff; border: 3px solid var(--ink); transform: rotate(-2deg);
    margin-bottom: 18px;
  }
  .hero h1 { font-size: clamp(28px, 7vw, 44px); font-weight: 900; letter-spacing: -.03em; line-height: 1.15; }
  .hero h1 mark { background: var(--lime); padding: 0 6px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
  .hero p { margin-top: 16px; font-size: 15px; line-height: 1.75; color: var(--dim); max-width: 46ch; font-weight: 500; }

  .chat { flex: 1; max-width: 640px; margin: 0 auto; width: 100%; padding: 10px 20px 150px; }
  .chips { display: flex; flex-wrap: wrap; gap: 10px; margin: 22px 0; }
  .chip {
    padding: 10px 15px; border: 3px solid var(--ink); border-radius: 0;
    background: var(--panel); font-size: 13px; font-weight: 700; cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink); transition: transform .1s, box-shadow .1s;
  }
  .chip:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); background: var(--lime); }

  .msg { margin: 20px 0; display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 82%; padding: 13px 17px; font-size: 15px; line-height: 1.65;
    border: 3px solid var(--ink); font-weight: 500;
  }
  .msg.ai .bubble { background: var(--panel); box-shadow: 4px 4px 0 var(--ink); }
  .msg.user .bubble { background: var(--blue); color: #fff; box-shadow: 4px 4px 0 var(--ink); }
  .msg.ai .label {
    font-size: 11px; font-weight: 900; letter-spacing: .04em; margin-bottom: 7px;
    display: inline-block; background: var(--ink); color: var(--lime); padding: 2px 8px;
  }

  .typing { display: inline-flex; gap: 5px; padding: 4px 0; }
  .typing i { width: 7px; height: 7px; background: var(--ink); border-radius: 50%; animation: t 1.1s infinite; }
  .typing i:nth-child(2) { animation-delay: .15s; } .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes t { 0%,60%,100% { opacity: .2 } 30% { opacity: 1 } }

  .inputbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 45%);
  }
  .inputbar .box {
    max-width: 600px; margin: 0 auto; display: flex;
    background: var(--panel); border: 3px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink);
  }
  .inputbar input { flex: 1; border: none; outline: none; background: none; font: inherit; font-weight: 600; font-size: 15px; padding: 15px 18px; color: var(--ink); }
  .inputbar input::placeholder { color: #9a9a9a; }
  .send { border: none; border-left: 3px solid var(--ink); background: var(--lime); color: var(--ink); width: 56px; font-size: 20px; font-weight: 900; cursor: pointer; }
</style>
</head>
<body>
  <header>
    <div class="badge">신</div>
    <div class="title">AI 신건우</div>
    <div class="status">LIVE</div>
  </header>

  <div class="hero">
    <div class="tag">DIGITAL TWIN</div>
    <h1>묻고 싶은 거,<br><mark>다 물어보세요.</mark></h1>
    <p>AI 데이터 PM 신건우의 디지털 트윈입니다. 지어낸 답은 안 해요 —
    모르는 건 본체가 직접 답하러 옵니다.</p>
  </div>

  <main class="chat">
    <div class="chips">
      <button class="chip">어떤 일 하셨어요?</button>
      <button class="chip">인생 영화 3편만요</button>
      <button class="chip">MBTI가 뭐예요?</button>
      <button class="chip">요즘 목표는요?</button>
    </div>

    <div class="msg user"><div class="bubble">어떤 일 하셨어요?</div></div>
    <div class="msg ai">
      <div>
        <div class="label">AI 건우</div>
        <div class="bubble">AI 학습 데이터의 의미적 정확성을 검증하는 데이터 PM으로 일했어요.
        100명 규모 라벨링 조직을 시트와 정책으로 시스템화해서 굴렸습니다.</div>
      </div>
    </div>
    <div class="msg ai">
      <div>
        <div class="label">AI 건우</div>
        <div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>
      </div>
    </div>
  </main>

  <div class="inputbar">
    <div class="box">
      <input placeholder="신건우에 대해 물어보세요..." />
      <button class="send">→</button>
    </div>
  </div>
</body>
</html>
