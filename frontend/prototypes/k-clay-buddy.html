<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K안 — Clay Buddy · AI 신건우</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  /* I안(클레이모피즘) 베이스 + 눈 달린 말랑 3D 마스코트.
     눈동자가 마우스를 따라오고(멈추면 원위치, 가끔 딴청), 잡아끌면 쭉 늘어났다 튕겨 돌아온다. */
  :root {
    --bg: #eef0fa; --ink: #3a3560; --dim: #8f8bb0;
    --lav: #c9c4f4; --peach: #ffd9c4; --mint: #c9efdd;
    --clay-hi: rgba(255,255,255,.95); --clay-lo: rgba(90,80,160,.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard Variable", Pretendard, sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100dvh; display: flex; flex-direction: column;
  }
  .clay {
    background: #fff;
    border-radius: 24px;
    box-shadow:
      0 14px 30px -8px var(--clay-lo),
      inset 0 -8px 14px -6px var(--clay-lo),
      inset 0 8px 12px -6px var(--clay-hi);
  }

  header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; background: rgba(238,240,250,.85); backdrop-filter: blur(10px); }
  header .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #fff 0%, var(--lav) 55%, #a89ef0 100%);
    box-shadow: 0 8px 18px -4px var(--clay-lo), inset 0 -5px 8px -3px var(--clay-lo), inset 0 5px 8px -3px var(--clay-hi);
    display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; color: #5a4fd0;
  }
  header .title { font-weight: 800; font-size: 15px; }
  header .status { margin-left: auto; font-size: 11px; color: var(--dim); font-weight: 600; }

  .hero { max-width: 620px; margin: 0 auto; width: 100%; padding: 36px 20px 14px; text-align: center; }

  /* ── 말랑 3D 구체 마스코트 ─────────────────────────── */
  .buddyWrap { position: relative; width: 150px; margin: 0 auto 6px; cursor: grab; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
  .buddyWrap:active { cursor: grabbing; }
  .buddy {
    width: 140px; height: 140px; margin: 0 auto; border-radius: 50%;
    position: relative;
    background:
      radial-gradient(circle at 32% 24%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.25) 26%, transparent 44%),
      radial-gradient(circle at 70% 85%, #a89ef0 0%, transparent 55%),
      radial-gradient(circle at 50% 50%, #d5d0f8 0%, var(--lav) 70%, #b3a9f2 100%);
    box-shadow:
      0 26px 44px -14px rgba(90,80,160,.45),
      inset 0 -12px 22px -8px rgba(90,80,160,.38),
      inset 0 12px 18px -8px rgba(255,255,255,.9);
    animation: bob 4.2s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  .buddy.squish { animation: squish .5s ease-out; }
  /* 드래그 중엔 bob을 끄고 인라인 transform으로 늘어남 · 놓으면 탄성 복원 */
  .buddy.dragging { animation: none; transform-origin: 50% 50%; }
  .buddy.snapback {
    animation: none; transform-origin: 50% 50%;
    transition: transform .7s cubic-bezier(.2, 2.4, .3, .7);
  }
  @keyframes bob { 0%,100% { transform: translateY(0) scale(1,1); } 50% { transform: translateY(-10px) scale(.985,1.015); } }
  @keyframes squish {
    0% { transform: scale(1,1); }
    30% { transform: scale(1.14,.8); }
    58% { transform: scale(.92,1.1); }
    80% { transform: scale(1.04,.96); }
    100% { transform: scale(1,1); }
  }
  /* 바닥 그림자 — 구체가 떠 있음을 알려주는 깊이 신호 */
  .buddyShadow {
    width: 84px; height: 16px; margin: 8px auto 0; border-radius: 50%;
    background: rgba(90,80,160,.25); filter: blur(6px);
    animation: shadowPulse 4.2s ease-in-out infinite;
  }
  @keyframes shadowPulse { 0%,100% { transform: scale(1); opacity: .9; } 50% { transform: scale(.82); opacity: .55; } }

  .eyes { position: absolute; top: 46px; left: 0; right: 0; display: flex; justify-content: center; gap: 26px; }
  .eye {
    width: 26px; height: 26px; border-radius: 50%; background: #fff; position: relative;
    box-shadow: inset 0 -2px 4px rgba(90,80,160,.25), 0 2px 4px rgba(90,80,160,.15);
    overflow: hidden;
  }
  .pupil {
    width: 12px; height: 12px; border-radius: 50%; background: #3a3560;
    position: absolute; top: 7px; left: 7px;
    transition: transform .08s linear;
  }
  .pupil::after {
    content: ""; position: absolute; width: 4px; height: 4px; border-radius: 50%;
    background: #fff; top: 1.5px; left: 1.5px;
  }
  .buddy.blink .eye { animation: blink .18s ease-in-out; }
  @keyframes blink { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(.08); } }

  /* ────────────────────────────────────────────────── */

  .hero h1 { font-size: clamp(25px, 6vw, 36px); font-weight: 900; letter-spacing: -.025em; line-height: 1.3; margin-top: 16px; }
  .hero h1 span { color: #7a6ef0; }
  .hero p { margin: 13px auto 0; font-size: 14.5px; line-height: 1.8; color: var(--dim); font-weight: 500; max-width: 42ch; }

  .chat { flex: 1; max-width: 620px; margin: 0 auto; width: 100%; padding: 10px 20px 155px; }
  .chips { display: flex; flex-wrap: wrap; gap: 11px; justify-content: center; margin: 24px 0; }
  .chip {
    padding: 12px 17px; border: none; border-radius: 18px; font-size: 13px; font-weight: 700;
    color: var(--ink); cursor: pointer; background: #fff;
    box-shadow: 0 10px 20px -6px var(--clay-lo), inset 0 -6px 10px -5px var(--clay-lo), inset 0 6px 9px -5px var(--clay-hi);
    transition: transform .12s, box-shadow .12s;
  }
  .chip:hover { transform: translateY(-3px); }
  .chip:active {
    transform: translateY(1px);
    box-shadow: 0 4px 10px -4px var(--clay-lo), inset 0 4px 10px -3px var(--clay-lo);
  }

  .msg { margin: 20px 0; display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble { max-width: 82%; padding: 15px 19px; font-size: 15px; line-height: 1.7; font-weight: 500; border-radius: 22px; }
  .msg.ai .bubble {
    background: #fff; border-bottom-left-radius: 8px;
    box-shadow: 0 12px 26px -8px var(--clay-lo), inset 0 -7px 12px -6px var(--clay-lo), inset 0 7px 11px -6px var(--clay-hi);
  }
  .msg.user .bubble {
    background: linear-gradient(145deg, #b7aef6, #9d90ee); color: #fff; border-bottom-right-radius: 8px;
    box-shadow: 0 12px 26px -8px rgba(122,110,240,.5), inset 0 -7px 12px -6px rgba(70,55,180,.4), inset 0 7px 11px -6px rgba(255,255,255,.55);
  }
  .msg.ai .label { font-size: 11.5px; color: #7a6ef0; font-weight: 800; margin-bottom: 7px; }

  .typing { display: inline-flex; gap: 5px; padding: 3px 0; }
  .typing i { width: 8px; height: 8px; border-radius: 50%; background: var(--lav); animation: tsquish 1.2s infinite; }
  .typing i:nth-child(2) { animation-delay: .18s; background: var(--peach); }
  .typing i:nth-child(3) { animation-delay: .36s; background: var(--mint); }
  @keyframes tsquish { 0%,60%,100% { transform: scale(1); } 30% { transform: scale(1.45,.75); } }

  .inputbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 20px calc(18px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 46%);
  }
  .inputbar .box {
    max-width: 584px; margin: 0 auto; display: flex; gap: 8px; align-items: center;
    padding: 7px 7px 7px 20px; border-radius: 26px;
  }
  .inputbar input { flex: 1; border: none; outline: none; background: none; font: inherit; font-size: 15px; font-weight: 500; padding: 12px 0; color: var(--ink); }
  .inputbar input::placeholder { color: #b7b3d4; }
  .send {
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; font-size: 17px; color: #fff;
    background: linear-gradient(145deg, #8f83ee, #7a6ef0);
    box-shadow: 0 10px 20px -5px rgba(122,110,240,.55), inset 0 -5px 9px -4px rgba(70,55,180,.45), inset 0 5px 8px -4px rgba(255,255,255,.5);
    transition: transform .12s;
  }
  .send:active { transform: scale(.92); }
</style>
</head>
<body>
  <header>
    <div class="avatar">신</div>
    <div class="title">AI 신건우</div>
    <div class="status">soft &amp; honest</div>
  </header>

  <div class="hero">
    <div class="buddyWrap" id="buddyWrap" title="잡아늘여 보세요">
      <div class="buddy" id="buddy">
        <div class="eyes">
          <div class="eye"><div class="pupil"></div></div>
          <div class="eye"><div class="pupil"></div></div>
        </div>
      </div>
      <div class="buddyShadow"></div>
    </div>

    <h1>안녕하세요,<br><span>AI 건우</span>예요</h1>
    <p>AI 데이터 PM 신건우의 디지털 트윈이에요. 검수된 정보로만 답하고,
    모르는 건 지어내지 않아요 — 본체가 직접 답하러 옵니다.</p>
  </div>

  <main class="chat">
    <div class="chips">
      <button class="chip">어떤 일 하셨어요?</button>
      <button class="chip">인생 영화 3편만요</button>
      <button class="chip">MBTI가 뭐예요?</button>
      <button class="chip">요즘 목표는요?</button>
    </div>

    <div class="msg user"><div class="bubble">어떤 일 하셨어요?</div></div>
    <div class="msg ai">
      <div>
        <div class="label">AI 건우</div>
        <div class="bubble">AI 학습 데이터의 의미적 정확성을 검증하는 데이터 PM으로 일했어요.
        100명 규모 라벨링 조직을 시트와 정책으로 시스템화해서 굴렸습니다.</div>
      </div>
    </div>
    <div class="msg ai">
      <div>
        <div class="label">AI 건우</div>
        <div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>
      </div>
    </div>
  </main>

  <div class="inputbar">
    <div class="box clay">
      <input placeholder="신건우에 대해 물어보세요..." />
      <button class="send">↑</button>
    </div>
  </div>

<script>
(function () {
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var buddy = document.getElementById('buddy');
  var wrap = document.getElementById('buddyWrap');
  var pupils = document.querySelectorAll('.pupil');
  var dragging = false;

  /* ── 눈동자 ──────────────────────────────
     마우스를 따라오고 → 3초간 이동 없으면 원위치 → 쉬는 동안 가끔 딴 데를 둘러봄 */
  var lastMove = 0;
  var eyesCentered = true;

  function setPupils(tx, ty, dur) {
    pupils.forEach(function (p) {
      p.style.transition = dur ? 'transform ' + dur + 's ease' : 'transform .08s linear';
      p.style.transform = 'translate(' + tx + 'px,' + ty + 'px)';
    });
  }

  window.addEventListener('pointermove', function (e) {
    lastMove = Date.now();
    eyesCentered = false;
    var r = buddy.getBoundingClientRect();
    var cx = r.left + r.width / 2, cy = r.top + r.height * .38;
    var dx = e.clientX - cx, dy = e.clientY - cy;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var m = Math.min(dist / 40, 1) * 5;
    setPupils(dx / dist * m, dy / dist * m, 0);
  });

  setInterval(function () {
    if (!eyesCentered && !dragging && Date.now() - lastMove > 3000) {
      eyesCentered = true;
      setPupils(0, 0, .5);
    }
  }, 400);

  (function idleGlance() {
    setTimeout(function () {
      if (eyesCentered && !dragging && !reduced) {
        var a = Math.random() * Math.PI * 2, m = 3 + Math.random() * 2;
        setPupils(Math.cos(a) * m, Math.sin(a) * m * .7, .3);
        setTimeout(function () {
          if (eyesCentered && !dragging) setPupils(0, 0, .35);
        }, 500 + Math.random() * 700);
      }
      idleGlance();
    }, 2800 + Math.random() * 3200);
  })();

  /* ── 깜빡임 (2.4~5초 랜덤) ── */
  function blink() {
    buddy.classList.add('blink');
    setTimeout(function () { buddy.classList.remove('blink'); }, 200);
    setTimeout(blink, 2400 + Math.random() * 2600);
  }
  if (!reduced) setTimeout(blink, 1800);

  /* ── 잡아늘이기 ──────────────────────────
     드래그 방향으로 쭉 늘어나고(당길수록 가늘어짐) 놓으면 탄성 복원.
     드래그 없이 짧게 탭하면 기존 말랑 눌림. */
  var sx = 0, sy = 0, moved = false;

  wrap.addEventListener('pointerdown', function (e) {
    dragging = true; moved = false;
    sx = e.clientX; sy = e.clientY;
    buddy.classList.remove('squish', 'snapback');
    buddy.classList.add('dragging');
    wrap.setPointerCapture(e.pointerId);
  });

  wrap.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    var dx = e.clientX - sx, dy = e.clientY - sy;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d > 4) moved = true;
    var deg = Math.atan2(dy, dx) * 180 / Math.PI;
    var stretch = 1 + Math.min(d / 160, 1.1);   // 최대 2.1배까지 늘어남
    var thin = 1 / Math.sqrt(stretch);          // 늘어난 만큼 가늘어짐 (부피 보존)
    buddy.style.transform =
      'translate(' + dx * .25 + 'px,' + dy * .25 + 'px) ' +
      'rotate(' + deg + 'deg) scale(' + stretch + ',' + thin + ') rotate(' + (-deg) + 'deg)';
  });

  function release() {
    if (!dragging) return;
    dragging = false;
    buddy.classList.remove('dragging');
    if (moved) {
      buddy.classList.add('snapback');
      buddy.style.transform = '';
      setTimeout(function () { buddy.classList.remove('snapback'); }, 720);
    } else {
      buddy.style.transform = '';
      void buddy.offsetWidth;  // 애니메이션 재시작을 위한 리플로우
      buddy.classList.add('squish');
    }
  }
  wrap.addEventListener('pointerup', release);
  wrap.addEventListener('pointercancel', release);
})();
</script>
</body>
</html>
