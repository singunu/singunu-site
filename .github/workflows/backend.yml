# 백엔드 CI/CD — main 브랜치 push 중 backend/·persona/·이 워크플로 변경 시에만 동작
# 흐름: Gradle 테스트 → Docker 빌드 → GHCR push → SSH로 서버에서 pull & 재시작
#
# ⚠️ IMAGE 의 OWNER 부분을 저장소 소유자명(GitHub 사용자/조직명, 반드시 소문자)으로 교체.
#    예) 소유자가 singunu 라면  ghcr.io/singunu/singunu-api
#    (자동화하려면 OWNER 대신 ${{ github.repository_owner }} 를 소문자로 변환해 써도 됨)
name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "persona/**"        # 이미지에 public_persona.md 를 함께 굽기 때문에 포함
      - ".github/workflows/backend.yml"
  workflow_dispatch:          # 필요 시 수동 실행

env:
  # 👇 OWNER 를 저장소 소유자명(소문자)으로 교체
  IMAGE: ghcr.io/singunu/singunu-api

jobs:
  # 1) 테스트 — 실패하면 배포로 넘어가지 않는다
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Gradle 테스트
        working-directory: backend
        run: |
          chmod +x ./gradlew || true
          if [ -x ./gradlew ]; then ./gradlew test --no-daemon; else gradle test --no-daemon; fi

  # 2) 빌드 & GHCR push
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write         # GHCR push 권한
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Buildx 세팅
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 별도 시크릿 불필요(자동 제공)

      - name: 이미지 태그 결정
        id: meta
        run: echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Docker 빌드 & push
        uses: docker/build-push-action@v6
        with:
          context: .                        # Dockerfile 이 backend/·persona/ 를 함께 복사하므로 루트가 컨텍스트
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) 서버에 SSH 접속해 최신 이미지로 재배포
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH 배포 (pull & restart)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}       # 개인키 전체(-----BEGIN ...) 를 시크릿에 저장
          script: |
            # 서버에 미리 배치해 둔 배포 스크립트 실행 (infra/deploy.sh 참고)
            # 인자로 배포할 이미지 태그(커밋 SHA 7자리)를 넘긴다
            bash /opt/singunu/deploy.sh ghcr.io/singunu/singunu-api:${{ needs.build.outputs.image_tag }}

# ── 필요한 GitHub Actions Secrets (Settings → Secrets and variables → Actions) ──
#   SSH_HOST          : 서버 고정 IP (예: 13.125.x.x)
#   SSH_USER          : SSH 접속 계정 (Lightsail Ubuntu 기본: ubuntu)
#   SSH_KEY           : SSH 개인키 전체 텍스트 (-----BEGIN OPENSSH PRIVATE KEY----- ...)
# ── 아래 값들은 서버 /opt/singunu/.env 에 두므로 워크플로에는 불필요하지만,
#    관리 편의상 GitHub Secrets 에도 백업해 두길 권장 ──
#   ANTHROPIC_API_KEY / MONGODB_URI / MAIL_USERNAME / MAIL_APP_PASSWORD / ADMIN_EMAIL
